name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flight_data_scrapper_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d flight_data_scrapper_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/flight_data_scrapper_test
      JWT_SECRET_KEY: ci-secret-key-ci-secret-key-ci-secret-key-123456
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: StrongPassword123!
      SEARCHAPI_KEY: test-key
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Run backend tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend lint
        run: npm run lint
      - name: Run frontend tests
        run: npm run test:run
      - name: Build frontend
        run: npm run build
